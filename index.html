<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock & Key Skin Care</title>
    <style>
        /* Modern Luxury 'Midnight Espresso' Aesthetic */
        body {
            background-color: #1C1714;
            color: #F6F4F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }
        
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Typographic Logo Placeholder */
        .logo-container {
            margin-bottom: 3rem;
        }
        .monogram {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }
        .brand-name {
            font-size: 1.1rem;
            letter-spacing: 6px;
            font-weight: 300;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Coming Soon Messaging */
        h1 {
            font-weight: 400;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        .subtitle {
            font-weight: 300;
            color: #A09B96; 
            max-width: 500px;
            line-height: 1.6;
            margin-top: 0;
        }

        /* Mandatory Legal Footer */
        footer {
            padding: 2rem;
            font-size: 0.75rem;
            color: #7A7571; 
            border-top: 1px solid #2A2420;
            line-height: 1.8;
        }
        .legal-entity {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            color: #A09B96;
        }
    </style>
</head>
<body>

    <main>
        <div class="logo-container">
            <p class="monogram">L&K</p>
            <p class="brand-name">Lock & Key Skin Care</p>
        </div>
        
        <h1>Frictionless digital dermatology.</h1>
        <p class="subtitle">Our exclusive clinical application is arriving soon.</p>
    </main>

    <footer>
        <span class="legal-entity">Operated by SAVARUN</span><br>
        LEKHRAJ SO NIHAL, SHERPUR, HINDAUN CITY, KARAULI, RAJASTHAN 322236
    </footer>

</body>
</html>
